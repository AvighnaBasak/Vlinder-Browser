<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shell Browser</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111112;
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      border-top: 4px solid #8AB4F8;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading Shell Browser...</p>
  </div>
  
  <script>
    console.log('[Launcher] Starting...')
    
    // Wait for NW.js to be ready
    if (typeof nw !== 'undefined') {
      console.log('[Launcher] NW.js detected')
      
      // Get the current window
      const win = nw.Window.get()
      
      // Load the WebUI extension and navigate to it
      // The ui folder should be loaded as an extension via package.json or command line
      
      // For now, just load webui.html directly
      // In a full setup, this would load via chrome-extension:// URL
      console.log('[Launcher] Loading webui.html...')
      
      // Try to get extension ID and navigate
      setTimeout(() => {
        if (chrome && chrome.runtime && chrome.runtime.id) {
          const extensionUrl = `chrome-extension://${chrome.runtime.id}/webui.html`
          console.log('[Launcher] Navigating to:', extensionUrl)
          window.location.href = extensionUrl
        } else {
          // Fallback: load webui.html directly
          console.log('[Launcher] No extension context, loading webui.html directly')
          window.location.href = 'webui.html'
        }
      }, 100)
    } else {
      document.body.innerHTML = '<div class="loading"><p>Error: NW.js not detected</p></div>'
      console.error('[Launcher] NW.js not detected!')
    }
  </script>
</body>
</html>
