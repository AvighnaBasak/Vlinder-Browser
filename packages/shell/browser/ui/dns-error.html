<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>This site can't be reached</title>
  <style>
    :root {
      /* Error page colors - themable */
      --error-bg: var(--bg-color, #202124);
      --error-text: var(--text-color, #e8eaed);
      --error-text-secondary: var(--text-secondary, #9aa0a6);
      --error-code-bg: var(--input-bg, #292a2d);
      --error-link-color: var(--input-focus, #8ab4f8);
    }
  
    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
      background-color: var(--error-bg);
      color: var(--error-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-container {
      max-width: 600px;
      text-align: left;
    }

    .error-icon {
      width: 96px;
      height: 96px;
      margin: 0 0 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .error-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      color: var(--error-text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .error-message {
      font-size: 14px;
      color: var(--error-text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .url-display {
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
      font-size: 13px;
      color: var(--error-link-color);
      background: var(--error-code-bg);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      word-break: break-all;
    }

    .suggestions {
      margin-top: 32px;
    }

    .suggestions h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--error-text);
      margin-bottom: 12px;
    }

    .suggestions ul {
      list-style: none;
      padding-left: 0;
    }

    .suggestions li {
      font-size: 13px;
      color: var(--error-text-secondary);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }

    .suggestions li:before {
      content: "•";
      position: absolute;
      left: 6px;
      color: var(--error-text-secondary);
    }

    .error-code {
      font-size: 12px;
      color: var(--error-text-secondary);
      opacity: 0.6;
      margin-top: 32px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">
      <img src="./dnserror.png" alt="Error icon">
    </div>

    <h1>This site can't be reached</h1>
    
    <div class="error-message" id="error-msg">
      The webpage at <strong id="failed-url"></strong> might be temporarily down or it may have moved permanently to a new web address.
    </div>

    <div class="url-display" id="url-box" style="display: none;">
      <span id="display-url"></span>
    </div>

    <div class="suggestions">
      <h2>Try:</h2>
      <ul>
        <li>Checking the spelling of the web address</li>
        <li>Checking your internet connection</li>
        <li>Checking any cables and restarting any routers</li>
      </ul>
    </div>

    <div class="error-code">ERR_NAME_NOT_RESOLVED</div>
  </div>

  <script>
    // Get the URL from the query string
    const params = new URLSearchParams(window.location.search);
    const failedUrl = params.get('url');
    
    if (failedUrl) {
      document.getElementById('failed-url').textContent = failedUrl;
      document.getElementById('display-url').textContent = failedUrl;
      document.getElementById('url-box').style.display = 'block';
    } else {
      document.getElementById('error-msg').textContent = 
        'The webpage might be temporarily down or it may have moved permanently to a new web address.';
    }
  </script>
  <script src="./theme-loader.js"></script>
</body>
</html>
