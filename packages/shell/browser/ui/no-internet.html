<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>No internet</title>
  <style>
    :root {
      /* Error page colors - themable */
      --error-bg: var(--bg-color, #202124);
      --error-text: var(--text-color, #e8eaed);
      --error-text-secondary: var(--text-secondary, #9aa0a6);
      --error-icon-color: var(--error-icon, #5f6368);
    }
  
    * { 
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
      background-color: var(--error-bg);
      color: var(--error-text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .error-container {
      max-width: 600px;
      text-align: left;
    }

    .error-icon {
      width: 96px;
      height: 96px;
      margin: 0 0 32px;
    }

    .error-icon svg {
      width: 100%;
      height: 100%;
    }

    h1 {
      font-size: 28px;
      font-weight: 400;
      color: var(--error-text);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .error-message {
      font-size: 14px;
      color: var(--error-text-secondary);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .suggestions {
      margin-top: 32px;
    }

    .suggestions h2 {
      font-size: 14px;
      font-weight: 500;
      color: var(--error-text);
      margin-bottom: 12px;
    }

    .suggestions ul {
      list-style: none;
      padding-left: 0;
    }

    .suggestions li {
      font-size: 13px;
      color: var(--error-text-secondary);
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
    }

    .suggestions li:before {
      content: "•";
      position: absolute;
      left: 6px;
      color: var(--error-text-secondary);
    }

    .error-code {
      font-size: 12px;
      color: var(--error-text-secondary);
      opacity: 0.6;
      margin-top: 32px;
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
    }
    
    .error-icon svg circle {
      fill: var(--error-code-bg, #3c4043);
      stroke: var(--error-icon-color);
    }
    
    .error-icon svg path,
    .error-icon svg line {
      stroke: var(--error-text-secondary);
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="45" fill="#3c4043" stroke="#5f6368" stroke-width="2"/>
        <path d="M30 55 L45 40 M55 40 L70 55" stroke="#9aa0a6" stroke-width="3" stroke-linecap="round"/>
        <path d="M35 50 Q50 35 65 50" stroke="none" fill="none"/>
        <line x1="30" y1="65" x2="70" y2="65" stroke="#9aa0a6" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>No internet</h1>
    
    <div class="error-message">
      Check your internet connection and try again.
    </div>

    <div class="suggestions">
      <h2>Try:</h2>
      <ul>
        <li>Checking the network cables, modem, and router</li>
        <li>Reconnecting to Wi-Fi</li>
        <li>Running Windows Network Diagnostics</li>
      </ul>
    </div>

    <div class="error-code">ERR_INTERNET_DISCONNECTED</div>
  </div>
  
  <script src="./theme-loader.js"></script>
</body>
</html>
