<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookmarks</title>
  <style>
    :root {
      /* Local, safe tokens that fallback to theme vars without self-reference */
      --c-bg: var(--bg-color, #111112);
      --c-text: var(--text-color, #e5e7eb);
      --c-text-secondary: var(--text-secondary, #a0a0a0);
      --c-surface: var(--tab-color, #232324);
      --c-input-bg: var(--input-bg, #18181a);
      --c-border: var(--input-border, #333335);
      --c-focus: var(--input-focus, #444448);

      --radius-xl: 18px;
      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 10px 28px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; }
    html, body { overflow-x: hidden; }

    body {
      font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
      background: radial-gradient(1200px 800px at 10% -10%, color-mix(in srgb, var(--c-surface) 35%, #000 65%), var(--c-bg)) fixed;
      color: var(--c-text);
      margin: 0;
      padding: 20px 24px;
      min-height: 100vh;
    }

    h1 { 
      margin: 0 0 20px; 
      font-size: 22px; 
      font-weight: 650; 
      letter-spacing: .2px; 
    }

    #bookmarks-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #bookmarks-list li {
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    #bookmarks-list li:hover {
      background: color-mix(in srgb, var(--c-surface) 80%, #000 20%);
      border-color: var(--c-focus);
      transform: translateX(2px);
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
    }

    .bookmark-title {
      font-size: 14px;
      color: var(--c-text);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .bookmark-url {
      font-size: 12px;
      color: var(--c-text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-date {
      font-size: 11px;
      color: var(--c-text-secondary);
      white-space: nowrap;
      opacity: 0.7;
    }

    .empty-state {
      text-align: center;
      padding: 80px 32px;
      color: var(--c-text-secondary);
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 15px;
      opacity: 0.8;
    }

    /* Scrollbar styling */
    body, #bookmarks-list {
      scrollbar-width: thin;
      scrollbar-color: color-mix(in srgb, var(--c-focus) 35%, var(--c-surface) 65%) var(--c-surface);
    }
    body::-webkit-scrollbar, #bookmarks-list::-webkit-scrollbar { width: 10px; height: 10px; }
    body::-webkit-scrollbar-track, #bookmarks-list::-webkit-scrollbar-track { background: var(--c-surface); border-radius: 8px; }
    body::-webkit-scrollbar-thumb, #bookmarks-list::-webkit-scrollbar-thumb { background: color-mix(in srgb, var(--c-focus) 35%, var(--c-surface) 65%); border: 2px solid var(--c-surface); border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Bookmarks</h1>

  <ul id="bookmarks-list"></ul>

  <div id="empty-state" class="empty-state" style="display: none;">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M25 10 L25 90 L50 75 L75 90 L75 10 Z" stroke="currentColor" stroke-width="3" fill="var(--c-surface)"/>
    </svg>
    <p>No bookmarks yet</p>
  </div>

  <script src="./theme-loader.js"></script>
  <script src="./bookmarks.js"></script>
</body>
</html>
